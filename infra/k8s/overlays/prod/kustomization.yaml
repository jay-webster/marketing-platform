apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: marketing-platform

# Image tag is updated by the deploy workflow:
# kustomize edit set image \
#   us-central1-docker.pkg.dev/activelab-mktg-platform/marketing-platform/backend=\
#   us-central1-docker.pkg.dev/activelab-mktg-platform/marketing-platform/backend:$GIT_SHA
images:
  - name: us-central1-docker.pkg.dev/activelab-mktg-platform/marketing-platform/backend
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: backend
