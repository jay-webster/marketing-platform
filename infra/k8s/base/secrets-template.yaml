# This is a template. Create the actual secret with:
#
#   kubectl create secret generic backend-secrets \
#     --namespace=marketing-platform \
#     --from-literal=database-url='postgresql+asyncpg://appuser:PASSWORD@localhost:5432/marketing_platform' \
#     --from-literal=secret-key='<64-char random string>' \
#     --from-literal=admin-token='<strong random string>' \
#     --from-literal=initial-admin-token='<one-time bootstrap token — delete after first admin registers>' \
#     --from-literal=app-url='https://api.activelab.com' \
#     --from-literal=github-token-encryption-key='<Fernet key from: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())">' \
#     --from-literal=gcs-bucket-name='activelab-mktg-ingestion' \
#     --from-literal=smtp-host='smtp.example.com' \
#     --from-literal=smtp-port='587' \
#     --from-literal=smtp-user='' \
#     --from-literal=smtp-pass='' \
#     --from-literal=smtp-from='noreply@activelab.com' \
#     --from-literal=anthropic-api-key='sk-ant-...' \
#     --from-literal=voyage-api-key='pa-...'
#
# DATABASE_URL note: Cloud SQL Auth Proxy runs as a sidecar on localhost:5432.
# The URL must point to localhost, NOT the Cloud SQL instance IP.
