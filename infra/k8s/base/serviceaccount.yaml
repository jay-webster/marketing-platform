apiVersion: v1
kind: ServiceAccount
metadata:
  name: marketing-platform-backend
  namespace: marketing-platform
  annotations:
    # Workload Identity — allows pods to authenticate to GCP as this service account
    # without storing credentials in Kubernetes secrets.
    iam.gke.io/gcp-service-account: marketing-platform-backend@activelab-mktg-platform.iam.gserviceaccount.com
