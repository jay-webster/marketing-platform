name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: marketing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/marketing_test
      TEST_DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/marketing_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      INITIAL_ADMIN_TOKEN: ci-test-admin-token
      ADMIN_TOKEN: ci-test-admin-token
      APP_URL: http://localhost:8000
      GITHUB_TOKEN_ENCRYPTION_KEY: ""   # generated in conftest
      GCS_BUCKET_NAME: test-bucket
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_FROM: test@example.com
      ANTHROPIC_API_KEY: sk-ant-test-key
      VOYAGE_API_KEY: pa-test-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: python -m alembic -c migrations/alembic.ini upgrade head

      - name: Run tests
        run: python -m pytest -q --tb=short
