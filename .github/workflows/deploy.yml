name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  PROJECT_ID: activelab-mktg-platform
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: marketing-platform
  IMAGE: backend
  GKE_CLUSTER: marketing-platform
  GKE_ZONE: us-central1-a
  NAMESPACE: marketing-platform

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    # Only deploy after CI passes
    needs: []
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest" \
            .

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Set image tag in kustomization
        working-directory: infra/k8s/overlays/prod
        run: |
          kustomize edit set image \
            "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k infra/k8s/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=300s
